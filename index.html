<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>YHub AI v2</title>

<meta name="theme-color"
content="#6C63FF">

<link rel="stylesheet"
href="style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="app">

<header class="topbar">

<button id="menuBtn">

<i class="fa-solid fa-bars"></i>

</button>

<h2>

YHub <span>AI</span>

</h2>

<div>

<button id="themeBtn">

<i class="fa-solid fa-moon"></i>

</button>

</div>

</header>

<aside id="sidebar">

<div class="logo">

<i class="fa-solid fa-brain"></i>

<h2>YHub AI</h2>

</div>
<button id="closeSidebar">

<i class="fa-solid fa-xmark"></i>

</button>
<button id="newChat">

<i class="fa-solid fa-plus"></i>

New Chat

</button>

<nav>

<button>

<i class="fa-solid fa-message"></i>

Chats

</button>

<button>

<i class="fa-solid fa-clock"></i>

History

</button>

<button>

<i class="fa-solid fa-bookmark"></i>

Saved

</button>

<button>

<i class="fa-solid fa-gear"></i>

Settings

</button>

</nav>

</aside>

<main>

<section class="hero">

<h1>

YHub AI

</h1>

<p>

Take help from
  
YOGI JI
  

</p>

</section>

<div id="chatArea">

<div class="welcome">

<i class="fa-solid fa-brain"></i>

<h2>

Welcome to

YHub AI
 
</h2>

<p>

Ask anything...

</p>

</div>
</div>

<div class="typing" id="typing">

<div class="dot"></div>

<div class="dot"></div>

<div class="dot"></div>

</div>

</main>


<footer class="inputBar">

<div class="inputBox">

<textarea

id="prompt"

placeholder="Ask anything..."

rows="1">

</textarea>

<button id="imageBtn">

<i class="fa-regular fa-image"></i>

</button>

<button id="uploadBtn">

<i class="fa-solid fa-paperclip"></i>

</button>
  
<input
type="file"
id="fileInput"
hidden
accept=".pdf,.txt,.doc,.docx,.png,.jpg,.jpeg">
  
<button id="voiceBtn">

<i class="fa-solid fa-microphone"></i>

</button>

<button id="sendBtn">

<i class="fa-solid fa-paper-plane"></i>

</button>

</div>

</footer>

</div>


<!-- Toast -->

<div id="toast">

Copied

</div>


<!-- Loading -->

<div id="loading">

<div class="loader"></div>

<p>

Thinking...

</p>

</div>


<!-- Settings -->

<div id="settingsModal">

<div class="settingsCard">

<h2>

Settings

</h2>

<label>

Theme

<select id="theme">

<option>

Dark

</option>

<option>

Light

</option>

</select>

</label>

<label>

Font Size

<select id="font">

<option>

Small

</option>

<option selected>

Medium

</option>

<option>

Large

</option>

</select>

</label>

<button id="closeSettings">

Close

</button>

</div>

</div>


<script src="config.js"></script>

<script type="module"src="firebase.js"></script>

<script src="script.js"></script>

</body>

</html>
